substitutions:
  _REGION: europe-west1
  _SERVICE: memoire
  _REPO: memoire                  # nome do repositório no Artifact Registry
  _GCS_BUCKET: memoire-immich-data  # bucket GCS para persistência do SQLite
  _MEMORY: 512Mi
  _CPU: "1"
  # Definir no trigger do Cloud Build (não ficam no git):
  _JWT_SECRET: ""
  _IMMICH_URL: ""
  _IMMICH_API_KEY: ""
  _ADMIN_EMAIL: ""

steps:
  # ── 1. Build da imagem Docker ──────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - --file=Dockerfile
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$COMMIT_SHA
      - --tag=europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      # Reutiliza a camada :latest como cache → builds mais rápidos
      - --cache-from=europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest
      - .

  # ── 2. Push para Artifact Registry ────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app

  # ── 3. Deploy no Cloud Run ─────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --execution-environment=gen2       # necessário para GCS volume mounts
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=10
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --timeout=60
      # Todas as variáveis de ambiente (sensíveis vêm das substitutions do trigger)
      - --set-env-vars=NODE_ENV=production,DATABASE_PATH=/data/db.sqlite,JWT_SECRET=${_JWT_SECRET},IMMICH_URL=${_IMMICH_URL},IMMICH_API_KEY=${_IMMICH_API_KEY},ADMIN_EMAIL=${_ADMIN_EMAIL}
      # Volume GCS para persistência do SQLite
      - --add-volume=name=data,type=cloud-storage,bucket=${_GCS_BUCKET}
      - --add-volume-mount=volume=data,mount-path=/data

# Imagens publicadas (aparece na tab "Build artifacts" do Cloud Build)
images:
  - europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:$COMMIT_SHA
  - europe-west1-docker.pkg.dev/$PROJECT_ID/${_REPO}/app:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8        # build mais rápido para npm ci + vite build
